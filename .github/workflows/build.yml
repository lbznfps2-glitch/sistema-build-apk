name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Dependencias
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          pip install --user --upgrade buildozer cython virtualenv

      - name: Build com Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          buildozer android clean
          yes | buildozer -v android debug
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: APK_SISTEMA
          path: bin/*.apk
          
