name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias do Android
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --user --upgrade buildozer cython virtualenv

      - name: Criar APK (Buildozer)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Aceita licenças e inicia o build
          buildozer -v android debug --accept-sdk-license
          
      - name: Enviar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: meu-apk-final
          path: bin/*.apk
          
